 name: Backup Supabase

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v5

      - name: Instalar Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Criar pasta de backup
        run: mkdir -p backup

      - name: Gerar dumps
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          npx supabase db dump --db-url "$DB_URL" -f backup/roles.sql --role-only
          npx supabase db dump --db-url "$DB_URL" -f backup/schema.sql
          npx supabase db dump --db-url "$DB_URL" -f backup/data.sql --data-only --use-copy

      - name: Compactar backup
        run: tar -czf backup-supabase.tar.gz backup

      - name: Salvar artefato
        uses: actions/upload-artifact@v6
        with:
          name: backup-supabase
          path: backup-supabase.tar.gz
          retention-days: 7
