name: Backup Supabase

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"
      timezone: "America/Sao_Paulo"
 
jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Criar pasta de backup
        run: mkdir -p backup

      - name: Gerar dumps
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          supabase db dump --db-url "$DB_URL" -f backup/roles.sql --role-only
          supabase db dump --db-url "$DB_URL" -f backup/schema.sql
          supabase db dump --db-url "$DB_URL" -f backup/data.sql --use-copy --data-only -x "storage.buckets_vectors" -x "storage.vector_indexes"

      - name: Compactar
        run: |
          tar -czf "supabase-backup-$(date +%F-%H%M).tar.gz" backup

      - name: Enviar artefato
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_number }}
          path: supabase-backup-*.tar.gz
          retention-days: 7
